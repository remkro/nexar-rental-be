server:
  servlet:
    context-path: /api/v1
  port: 8080

spring:
  mvc:
    async:
      request-timeout: 60000

  datasource:
    hikari:
      schema: rental
      minimum-idle: 5
      maximum-pool-size: 50
      connection-timeout: 30000
      auto-commit: true
      connection-test-query: SELECT 1
    type: com.zaxxer.hikari.HikariDataSource

  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 100
        order_by:
          default_null_ordering: last

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: ${spring.datasource.hikari.schema}
    baseline-on-migrate: true
    placeholder-replacement: false

jwt:
  secret: ${JWT_SECRET}
  validity:
    in-seconds: 86400
    in-seconds-for-remember-me: 2592000

mailersend:
  token: ${MAILERSEND_TOKEN}
  sender-email: ${MAILERSEND_SENDER_EMAIL:contact@nexarrental.com}
  sender-name: ${MAILERSEND_SENDER_NAME:Nexar Rental}
  welcome-message-template-id: ${MAILERSEND_WELCOME_TEMPLATE_ID:123}

app:
  rental:
    max-active-rentals-per-customer: ${APP_MAX_ACTIVE_RENTALS:3}
  email:
    welcome-message:
      enabled: ${APP_EMAIL_WELCOME_ENABLED:true}